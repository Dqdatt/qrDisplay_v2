[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.31
    paulstoffregen/XPT2046_Touchscreen @ 0.0.0-alpha+sha.26b691b2c8
    lvgl/lvgl @ ^8.3.9
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^6.21.3
    knolleary/PubSubClient

build_flags =
    ; Cấu hình LVGL
    -D LV_CONF_SKIP
    -D LV_TICK_CUSTOM=1
    -D LV_USE_THEME_DEFAULT=1
    -D LV_FONT_MONTSERRAT_14=1
    -D LV_FONT_MONTSERRAT_12=1
    -D LV_FONT_MONTSERRAT_16=1
    -D LV_FONT_MONTSERRAT_18=1
    -D LV_FONT_MONTSERRAT_28=1
    
    ; Cấu hình TFT_eSPI (Dựa trên hình ảnh của bạn)
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1 ; Thường CYD dùng ILI9341, nếu sai màu đổi thành ST7789_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1      ; Dùng chung với mạch ESP32
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SPI_FREQUENCY=40000000

    -D LV_USE_PNG=1
    -D LV_USE_GIF=1